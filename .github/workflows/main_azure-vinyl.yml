# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - azure-vinyl

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Build solution
        run: dotnet build --configuration Release

      - name: Run unit tests
        run: dotnet test --configuration Release --no-build

      - name: Publish web app
        run: dotnet publish ./src/AzureVinyl.Web/AzureVinyl.Web.csproj -c Release -o ./publish --no-build

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: net-app
          path: ./publish

  deploy-web:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: net-app
          path: net-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_F199932864E649439C49599CBAC3B493 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_FCAEC207CD6F47E9AAAADC9E66399CBA }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_2CB94D1235A146C48C0F5487B27B781C }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'azure-vinyl'
          slot-name: 'Production'
          package: ./net-app
          
  deploy-api:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_F199932864E649439C49599CBAC3B493 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_FCAEC207CD6F47E9AAAADC9E66399CBA }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_2CB94D1235A146C48C0F5487B27B781C }}

      - name: Show Azure context
        run: az account show

      - name: Login to ACR
        run: az acr login --name containerregistryazurevinyl

      - name: Build API Docker image
        run: |
          docker build -t azurevinyl-api -f src/AzureVinyl.Api/Dockerfile .

      - name: Tag image
        run: |
          docker tag azurevinyl-api containerregistryazurevinyl.azurecr.io/azurevinyl-api:latest

      - name: Push image
        run: |
          docker push containerregistryazurevinyl.azurecr.io/azurevinyl-api:latest

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name container-app-azure-vinyl-api \
            --resource-group resource-group-azure-vinyl-dev \
            --image containerregistryazurevinyl.azurecr.io/azurevinyl-api:latest